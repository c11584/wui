version: '3.8'

services:
  wui:
    build: .
    image: wui:latest
    container_name: wui
    restart: unless-stopped
    ports:
      - "32452:32452"
    volumes:
      - ./data:/app/data
      - ./xray:/app/xray
      - ./logs:/app/logs
    environment:
      - WUI_CONFIG=/app/data/config.json
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:32452/"]
      interval: 30s
      timeout: 10s
      retries: 3

  license-server:
    build:
      context: ./apps/license-server
      dockerfile: Dockerfile
    image: wui-license:latest
    container_name: wui-license
    restart: unless-stopped
    ports:
      - "32453:32453"
    volumes:
      - ./data/license:/app/data
    environment:
      - TZ=Asia/Shanghai

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    image: wui-admin:latest
    container_name: wui-admin
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - ./data/admin:/app/data
    environment:
      - TZ=Asia/Shanghai
